# Set the workflow name.
name: CI

# Execute the workflow on pushes to primary/release branches, version
# tag pushes, pull requests, merge queue, and manual dispatch.
on:
  push:
    branches:
      - master
      - 'release-branch-*'
    tags:
      - 'v*'
  pull_request:
  merge_group:
  workflow_dispatch:

# Restrict default token permissions. Jobs that need write access
# (e.g., release) escalate explicitly.
permissions:
  contents: read

# Cancel in-progress runs for the same ref, except for tag builds
# (which should always run to completion for releases).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

# Determine whether this is a "full" CI run (release builds, code
# signing, sidecar images, artifact upload) or a "slim" run (analysis,
# tests, and slim builds only). Full CI runs on merge queue, tags,
# master/release pushes, and manual dispatch. PR CI is slim.
env:
  FULL_CI: >-
    ${{
      github.event_name == 'merge_group' ||
      github.ref_type == 'tag' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (
        github.ref == 'refs/heads/master' ||
        startsWith(github.ref, 'refs/heads/release-branch-')
      ))
    }}

# Define the workflow jobs.
jobs:
  # Detect which areas of the codebase have changed. This is used to
  # conditionally run expensive steps (Docker transport tests, sidecar
  # builds) in slim CI when their relevant files change.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_windows_docker: ${{ steps.detect.outputs.run_windows_docker }}
      run_sidecar: ${{ steps.detect.outputs.run_sidecar }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: "Plan optional CI work"
        id: detect
        env:
          MUTAGEN_CI_EVENT_NAME: ${{ github.event_name }}
          MUTAGEN_CI_FULL: ${{ env.FULL_CI }}
          MUTAGEN_CI_PULL_REQUEST_BASE_SHA: >-
            ${{ github.event.pull_request.base.sha }}
          MUTAGEN_CI_MERGE_GROUP_BASE_SHA: >-
            ${{ github.event.merge_group.base_sha }}
          MUTAGEN_CI_PUSH_BASE_SHA: ${{ github.event.before }}
        run: scripts/ci/detect_changes.sh
  verification:
    name: Commit Verification
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: "Perform commit verification"
        run: |
          # Determine the target commit range.
          export VERIFY_COMMIT_START="${{ github.event.pull_request.base.sha }}"
          export VERIFY_COMMIT_END="${{ github.event.pull_request.head.sha }}"

          # Perform verification.
          scripts/ci/verify_commits.sh
  macos:
    name: macOS
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.2'
      - name: "Install sha256sum"
        run: brew install coreutils
      - run: scripts/ci/setup_go.sh
      - run: scripts/ci/setup_ssh.sh
      - run: scripts/ci/setup_partitions_darwin.sh
      - run: scripts/ci/analyze.sh
      - run: scripts/ci/test.sh
        env:
          MUTAGEN_CI_SKIP_RACE: ${{ env.FULL_CI != 'true' }}
      - run: scripts/ci/build.sh
        env:
          MUTAGEN_CI_FULL_BUILD: ${{ env.FULL_CI }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_CODESIGN_CERTIFICATE_AND_KEY: ${{ secrets.MACOS_CODESIGN_CERTIFICATE_AND_KEY }}
          MACOS_CODESIGN_CERTIFICATE_AND_KEY_PASSWORD: ${{ secrets.MACOS_CODESIGN_CERTIFICATE_AND_KEY_PASSWORD }}
      - run: scripts/ci/notarize.sh
        if: github.ref_type == 'tag'
        env:
          MACOS_NOTARIZE_APPLE_ID: ${{ secrets.MACOS_NOTARIZE_APPLE_ID }}
          MACOS_NOTARIZE_APP_SPECIFIC_PASSWORD: ${{ secrets.MACOS_NOTARIZE_APP_SPECIFIC_PASSWORD }}
          MACOS_NOTARIZE_TEAM_ID: ${{ secrets.MACOS_NOTARIZE_TEAM_ID }}
      - run: scripts/ci/sha256sum.sh
        if: env.FULL_CI == 'true'
      - uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        id: import_gpg
        if: github.ref_type == 'tag'
        with:
          gpg_private_key: ${{ secrets.GPG_SIGNING_KEY }}
          passphrase: ${{ secrets.GPG_SIGNING_KEY_PASSWORD }}
      - run: scripts/ci/sha256sign.sh
        if: github.ref_type == 'tag'
        env:
          SHA256_GPG_SIGNING_IDENTITY: ${{ steps.import_gpg.outputs.email }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: github.ref_type == 'tag'
        with:
          name: bundles
          path: build/release/*
          retention-days: 2
  linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        goversion: ['1.25.9', '1.26.2']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.goversion }}
      - run: scripts/ci/setup_go.sh
      - run: scripts/ci/setup_ssh.sh
      - run: scripts/ci/setup_docker.sh
      - run: scripts/ci/analyze.sh
      - run: scripts/ci/test.sh
      - run: scripts/ci/test_386.sh
      - run: scripts/ci/build.sh
  windows:
    name: Windows
    runs-on: windows-latest
    needs: [changes]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.2'
      - run: scripts/ci/setup_go.sh
        shell: bash
      - run: scripts/ci/setup_docker.sh
        if: needs.changes.outputs.run_windows_docker == 'true'
        shell: bash
      - name: "Prepare Windows partition script"
        run: |
          # Populate the partition setup script with the repository path since
          # diskpart doesn't support relative paths or environment variable
          # substitution. While we could hardcode a path into the script, that
          # breaks CI for mirrors that have a different repository name.
          REPONAME="$(basename "$(pwd)")"
          sed -e "s/REPONAME/D:\\\\a\\\\${REPONAME}\\\\${REPONAME}/g" \
            scripts/ci/setup_partitions_windows_template.txt \
            > setup_partitions_windows.txt
        shell: bash
      - run: diskpart /s setup_partitions_windows.txt
      - run: scripts/ci/analyze.sh
        shell: bash
      - run: scripts/ci/test.sh
        shell: bash
        env:
          MUTAGEN_CI_SKIP_RACE: ${{ env.FULL_CI != 'true' }}
          MUTAGEN_CI_SKIP_DOCKER: >-
            ${{
              needs.changes.outputs.run_windows_docker != 'true'
            }}
      - run: scripts/ci/test_386.sh
        shell: bash
      - run: scripts/ci/build.sh
        shell: bash
  sidecar:
    name: Sidecar
    runs-on: ubuntu-latest
    if: needs.changes.outputs.run_sidecar == 'true'
    needs: [changes, macos, linux, windows]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.2'
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        if: github.ref_type == 'tag' && github.repository == 'mutagen-io/mutagen'
        with:
          username: ${{ secrets.SIDECAR_DEPLOYMENT_USER }}
          password: ${{ secrets.SIDECAR_DEPLOYMENT_TOKEN }}
      - name: "Determine sidecar tag"
        id: tag
        run: echo "tag=$(go run scripts/ci/sidecar_tag.go)" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          file: images/sidecar/linux/Dockerfile
          target: mit
          tags: ${{ steps.tag.outputs.tag }}
          push: ${{ github.ref_type == 'tag' && github.repository == 'mutagen-io/mutagen' }}
          platforms: |
            linux/386
            linux/amd64
            linux/arm/v6
            linux/arm/v7
            linux/arm64/v8
            linux/ppc64le
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          file: images/sidecar/linux/Dockerfile
          target: sspl
          tags: ${{ steps.tag.outputs.tag }}-sspl
          push: ${{ github.ref_type == 'tag' && github.repository == 'mutagen-io/mutagen' }}
          platforms: |
            linux/386
            linux/amd64
            linux/arm/v6
            linux/arm/v7
            linux/arm64/v8
            linux/ppc64le
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    needs: [macos, linux, windows, sidecar]
    permissions:
      contents: write
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bundles
          path: bundles
      - uses: alexellis/upload-assets@13926a61cdb2cb35f5fdef1c06b8b591523236d3 # 0.4.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          asset_paths: '["bundles/*"]'
